
services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  queue:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"

  storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --reload
    volumes:
      - .:/app
      - ${FILESYSTEM_SOURCE_VIDEOS_FOLDER}:/media/filesystem_source_video
      - ./secrets/google_client_secret.json:/app/secrets/google_client_secret.json
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_CREDENTIALS_PATH=/app/secrets/google_client_secret.json
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 9.9.9.9
      - 208.67.222.222
    depends_on:
      - db
      - queue
      - storage
    ports:
      - "8000:8000"

  worker:
    build: .
    command: celery -A app.worker.tasks:celery_app worker --loglevel=info
    volumes:
      - .:/app
      - ${FILESYSTEM_SOURCE_VIDEOS_FOLDER}:/media/filesystem_source_video
      - ./secrets/google_client_secret.json:/app/secrets/google_client_secret.json
      - ./secrets/token.pickle:/app/secrets/token.pickle
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - GOOGLE_CREDENTIALS_PATH=${GOOGLE_CREDENTIALS_PATH}
      - YOUTUBE_OAUTH_TOKEN=1
      - YOUTUBE_PUBLISH_ENABLED=${YOUTUBE_PUBLISH_ENABLED}
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 9.9.9.9
      - 208.67.222.222
    depends_on:
      - db
      - queue
      - storage

  beat:
    build: .
    command: celery -A app.worker.tasks beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
    depends_on:
      - db
      - queue

volumes:
  postgres_data:
  minio_data: